<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #111;
      color: #0f0;
      font-family: 'Courier New', monospace;
    }
    .form-control {
      background-color: #222;
      border: 1px solid #0f0;
      color: #0f0;
    }
    .form-control:focus {
      box-shadow: 0 0 10px #0f0;
    }
    .btn {
      background-color: #0f0;
      color: #000;
      font-weight: bold;
    }
    .btn:hover {
      background-color: #0c0;
    }
  </style>
</head>
<body>
  <div class="container mt-5">
    <h2 class="text-center mb-4">Contact Us</h2>
    <form id="contactForm" class="p-4 border rounded-3">
      <div class="mb-3">
        <label for="name" class="form-label">Name</label>
        <input type="text" class="form-control" id="name" required />
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" required />
      </div>
      <div class="mb-3">
        <label for="message" class="form-label">Message</label>
        <textarea class="form-control" id="message" rows="4" required></textarea>
      </div>
      <button type="submit" class="btn w-100">Send</button>
      <p id="responseMsg" class="text-center mt-3"></p>
    </form>
  </div>

  <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbxcO9Z2qxysP9h6VSUIpIAS9ymf3sxTRNwW-Ux_Q-W4fzWb8FEkqV_0d9BcP7vvzELQMw/exec"; 
    const form = document.getElementById("contactForm");
    const responseMsg = document.getElementById("responseMsg");

    form.addEventListener("submit", (e) => {
      e.preventDefault();

      const data = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        message: document.getElementById("message").value
      };

      fetch(scriptURL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      })
      .then(() => {
        responseMsg.textContent = "✅ Message sent successfully! ms edits reply you soon";
        form.reset();
      })
      .catch(() => {
        responseMsg.textContent = "❌ Something went wrong. Try again!";
      });
    });
  </script>
</body>
</html>
