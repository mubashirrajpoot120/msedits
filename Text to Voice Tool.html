<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text to Speech - MS Edits</title>
  
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    :root {
      --hacker-green: #00ff00;
      --hacker-dark: #0a0a0a;
      --hacker-darker: #050505;
      --hacker-gray: #1a1a1a;
      --hacker-light: #cccccc;
    }

    body {
      font-family: 'Courier New', monospace;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: var(--hacker-light);
      background-color: var(--hacker-darker);
      overflow-x: hidden;
      position: relative;
      scroll-behavior: smooth;
    }

    /* Matrix Background */
    .matrix-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
          radial-gradient(circle at 20% 30%, rgba(30, 30, 30, 0.8) 0%, transparent 50%),
          radial-gradient(circle at 80% 70%, rgba(20, 20, 20, 0.6) 0%, transparent 50%);
      z-index: -1;
    }

    .matrix-bg::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
          linear-gradient(rgba(0, 255, 0, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 255, 0, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: matrixMove 20s linear infinite;
    }

    @keyframes matrixMove {
      0% { transform: translateY(0); }
      100% { transform: translateY(50px); }
    }

    /* Terminal Container */
    .terminal-container {
      background: linear-gradient(145deg, #1a1a1a, #222222);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(0, 255, 0, 0.1);
      position: relative;
      width: 100%;
      max-width: 600px;
      margin: 20px;
    }

    .terminal-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(45deg, transparent, rgba(0, 255, 0, 0.05), transparent);
      transform: translateX(-100%);
      transition: transform 0.6s;
    }

    .terminal-container:hover::before {
      transform: translateX(100%);
    }

    /* Terminal Header */
    .terminal-header {
      background: rgba(10, 10, 10, 0.9);
      padding: 15px 20px;
      border-bottom: 1px solid rgba(0, 255, 0, 0.2);
      display: flex;
      align-items: center;
    }

    .terminal-title {
      color: var(--hacker-green);
      font-weight: bold;
      font-size: 1.2rem;
      margin: 0;
    }

    .terminal-controls {
      margin-left: auto;
      display: flex;
      gap: 10px;
    }

    .terminal-control {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .control-close { background: #ff5f57; }
    .control-minimize { background: #ffbd2e; }
    .control-maximize { background: #28ca42; }

    /* Terminal Content */
    .terminal-content {
      padding: 30px;
    }

    .terminal-prompt {
      color: var(--hacker-green);
      font-weight: bold;
      margin-bottom: 20px;
      font-size: 1.1rem;
    }

    /* Text Area */
    .hacker-textarea {
      width: 100%;
      height: 150px;
      font-size: 1em;
      padding: 15px;
      border-radius: 8px;
      border: 1px solid rgba(0, 255, 0, 0.3);
      outline: none;
      resize: vertical;
      margin-bottom: 20px;
      background: rgba(20, 20, 20, 0.8);
      color: var(--hacker-light);
      font-family: 'Courier New', monospace;
      box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.3);
    }

    .hacker-textarea:focus {
      border-color: var(--hacker-green);
      box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
    }

    /* Buttons */
    .hacker-btn {
      background: linear-gradient(90deg, var(--hacker-green), #00cc00);
      color: #000;
      font-weight: bold;
      border: none;
      border-radius: 5px;
      transition: all 0.3s ease;
      padding: 12px 25px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      width: 100%;
      margin-bottom: 20px;
    }

    .hacker-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 255, 0, 0.4);
    }

    .hacker-btn:active {
      transform: translateY(0);
    }

    /* Audio Player */
    .hacker-audio {
      width: 100%;
      margin-top: 20px;
      margin-bottom: 20px;
      filter: invert(1) hue-rotate(90deg);
      border-radius: 5px;
    }

    /* Footer */
    .footer {
      margin-top: 20px;
      font-size: 0.85em;
      color: #777;
      text-align: center;
    }

    .footer a {
      color: var(--hacker-green);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s ease;
    }

    .footer a:hover {
      color: #00cc00;
      text-decoration: underline;
    }

    /* WhatsApp Channel Link */
    .whatsapp-channel {
      background: rgba(37, 211, 102, 0.1);
      border: 1px solid rgba(37, 211, 102, 0.3);
      border-radius: 8px;
      padding: 15px;
      margin-top: 20px;
      text-align: center;
    }

    .whatsapp-channel a {
      color: #25D366;
      text-decoration: none;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .whatsapp-channel a:hover {
      color: #128C7E;
      text-decoration: underline;
    }

    /* Cursor Animation */
    .typing-cursor {
      display: inline-block;
      width: 10px;
      height: 1.2em;
      background-color: var(--hacker-green);
      margin-left: 5px;
      animation: blink 1s infinite;
      vertical-align: middle;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Status Message */
    .status-message {
      color: var(--hacker-green);
      font-size: 0.9em;
      margin-top: 10px;
      text-align: center;
      min-height: 20px;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .terminal-container {
        margin: 15px;
      }
      
      .terminal-content {
        padding: 20px;
      }
      
      .terminal-title {
        font-size: 1rem;
      }
      
      .hacker-textarea {
        height: 120px;
      }
    }

    @media (max-width: 576px) {
      .terminal-container {
        margin: 10px;
      }
      
      .terminal-content {
        padding: 15px;
      }
      
      .terminal-prompt {
        font-size: 1rem;
      }
      
      .hacker-btn {
        padding: 10px 20px;
      }
    }
  </style>
  <!-- Paste this before </body> -->
<script>
(function() {
  // --- Helpers ---
  const removeExisting = (id) => {
    const el = document.getElementById(id);
    if (el) el.remove();
  };

  const clamp = (value, min, max) => Math.max(min, Math.min(max, value));

  // --- Create small popup at mouse position (for right-click) ---
  function showPopupAt(x, y) {
    removeExisting('inspect-popup');

    const popup = document.createElement('div');
    popup.id = 'inspect-popup';
    Object.assign(popup.style, {
      position: 'fixed',
      left: x + 'px',
      top: y + 'px',
      transform: 'translate(-10px, -10px)',
      background: '#000',
      color: '#39ff14',
      fontFamily: "Courier New, monospace",
      padding: '12px 14px',
      borderRadius: '6px',
      border: '1px solid rgba(57,255,20,0.12)',
      boxShadow: '0 8px 30px rgba(0,0,0,0.8), 0 0 10px rgba(57,255,20,0.04) inset',
      zIndex: 2147483647,
      maxWidth: '320px',
      whiteSpace: 'pre-wrap'
    });

    // content
    popup.innerHTML = `
      <div style="font-weight:700; margin-bottom:6px;">⚠️ INSPECTION NOT ALLOWED</div>
      <div style="font-size:13px; line-height:1.4;">
        ms edits — my dear son:
        If you want this tool's source code, contact: 03167364896

        اگر آپ کو اس ٹول کا کوڈ چاہیے تو اس نمبر پر رابطہ کریں:
        03167364896
      </div>
      <div style="text-align:right; margin-top:8px;">
        <button id="inspect-popup-ok" style="
          font-family: Courier New, monospace;
          font-weight:700;
          background: linear-gradient(90deg, rgba(57,255,20,0.95), rgba(30,200,10,0.95));
          color: #001b00;
          border: 1px solid rgba(57,255,20,0.9);
          padding:6px 10px;
          border-radius:5px;
          cursor:pointer;
        ">I UNDERSTAND</button>
      </div>
    `;

    document.body.appendChild(popup);

    // ensure popup fully visible in viewport (adjust if near edges)
    const rect = popup.getBoundingClientRect();
    const pad = 8;
    let left = rect.left;
    let top = rect.top;
    if (rect.right > window.innerWidth - pad) left = window.innerWidth - rect.width - pad;
    if (rect.left < pad) left = pad;
    if (rect.bottom > window.innerHeight - pad) top = window.innerHeight - rect.height - pad;
    if (rect.top < pad) top = pad;
    popup.style.left = left + 'px';
    popup.style.top = top + 'px';
    popup.style.transform = 'none';

    // close handlers
    document.getElementById('inspect-popup-ok').addEventListener('click', () => removeExisting('inspect-popup'));
    // close popup when clicking anywhere else
    setTimeout(() => {
      window.addEventListener('mousedown', onDocClick);
    }, 10);

    function onDocClick(ev) {
      if (!popup.contains(ev.target)) {
        removeExisting('inspect-popup');
        window.removeEventListener('mousedown', onDocClick);
      }
    }
  }

  // --- Create centered hacker modal for keyboard shortcuts ---
  function showCenteredModal() {
    if (document.getElementById('inspect-hacker-overlay')) return;

    // overlay
    const overlay = document.createElement('div');
    overlay.id = 'inspect-hacker-overlay';
    Object.assign(overlay.style, {
      position: 'fixed',
      inset: '0',
      background: 'rgba(0,0,0,0.98)',
      display: 'flex',
      alignItems: 'center',
      justifyContent: 'center',
      zIndex: 2147483647,
      fontFamily: "Courier New, monospace",
      color: '#39ff14',
      padding: '18px'
    });

    const box = document.createElement('div');
    box.id = 'inspect-hacker-modal';
    Object.assign(box.style, {
      width: '92%',
      maxWidth: '760px',
      background: 'rgba(0,0,0,0.95)',
      border: '1px solid rgba(57,255,20,0.12)',
      padding: '28px',
      borderRadius: '8px',
      boxShadow: '0 20px 60px rgba(0,0,0,0.9), 0 0 40px rgba(57,255,20,0.06) inset',
      textAlign: 'left',
      lineHeight: '1.6'
    });

    const header = document.createElement('div');
    header.innerHTML = '⚠️  <span style="font-weight:700; letter-spacing:1px;">INSPECTION NOT ALLOWED</span>';
    Object.assign(header.style, {
      color: '#39ff14',
      fontSize: '20px',
      marginBottom: '12px'
    });

    const terminal = document.createElement('div');
    Object.assign(terminal.style, {
      background: 'transparent',
      padding: '14px',
      borderRadius: '6px',
      minHeight: '90px',
      color: '#39ff14',
      fontSize: '15px',
      whiteSpace: 'pre-wrap'
    });

    terminal.innerText =
`ms edits — my dear son:
If you want this tool's source code, contact: 03167364896

اگر آپ کو اس ٹول کا کوڈ چاہیے تو اس نمبر پر رابطہ کریں:
03167364896
`;

    const caret = document.createElement('span');
    caret.textContent = ' █';
    Object.assign(caret.style, {
      display: 'inline-block',
      marginLeft: '6px',
      animation: 'blink 1s steps(2, start) infinite'
    });
    terminal.appendChild(caret);

    const btn = document.createElement('button');
    btn.innerText = 'I UNDERSTAND';
    Object.assign(btn.style, {
      marginTop: '16px',
      padding: '10px 20px',
      fontSize: '14px',
      fontFamily: "Courier New, monospace",
      color: '#001b00',
      background: 'linear-gradient(90deg, rgba(57,255,20,0.95), rgba(30,200,10,0.95))',
      border: '1px solid rgba(57,255,20,0.9)',
      borderRadius: '6px',
      cursor: 'pointer',
      boxShadow: '0 6px 20px rgba(57,255,20,0.10), 0 0 18px rgba(57,255,20,0.06) inset'
    });
    btn.addEventListener('click', removeCenteredModal);

    box.appendChild(header);
    box.appendChild(terminal);
    box.appendChild(btn);
    overlay.appendChild(box);
    document.body.appendChild(overlay);

    // inject blinking keyframes if not present
    if (!document.getElementById('inspect-hacker-anim')) {
      const style = document.createElement('style');
      style.id = 'inspect-hacker-anim';
      style.innerHTML = '@keyframes blink { 50% { opacity: 0 } 100% { opacity: 1 } }';
      document.head.appendChild(style);
    }

    // prevent clicking background to close (owner can remove from console)
  }

  function removeCenteredModal() {
    removeExisting('inspect-hacker-overlay');
  }

  // --- Blocks: show popup only when user actually acts ---
  document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
    // show popup at click point (use clientX/Y)
    const x = clamp(e.clientX, 8, window.innerWidth - 8);
    const y = clamp(e.clientY, 8, window.innerHeight - 8);
    showPopupAt(x, y);
  }, {passive: false});

  document.addEventListener('keydown', function(e) {
    const key = e.key || String.fromCharCode(e.keyCode || 0);

    // F12
    if (key === 'F12' || e.keyCode === 123) {
      e.preventDefault();
      showCenteredModal();
      return;
    }

    // Ctrl+Shift+I or Ctrl+Shift+J
    if (e.ctrlKey && e.shiftKey && (key.toLowerCase() === 'i' || key.toLowerCase() === 'j')) {
      e.preventDefault();
      showCenteredModal();
      return;
    }

    // Ctrl+U (view-source)
    if (e.ctrlKey && key.toLowerCase() === 'u') {
      e.preventDefault();
      showCenteredModal();
      return;
    }

    // Ctrl+Shift+C (element picker)
    if (e.ctrlKey && e.shiftKey && key.toLowerCase() === 'c') {
      e.preventDefault();
      showCenteredModal();
      return;
    }
  }, {passive: false});

  // --- Optional: allow owner remove via console if needed ---
  // run: document.getElementById('inspect-popup')?.remove(); document.getElementById('inspect-hacker-overlay')?.remove();

})();
</script>
</head>
<body>
  <div class="matrix-bg"></div>

  <div class="terminal-container">
    <div class="terminal-header">
      <h2 class="terminal-title">MS EDITS TEXT TO SPEECH</h2>
      <div class="terminal-controls">
        <div class="terminal-control control-close"></div>
        <div class="terminal-control control-minimize"></div>
        <div class="terminal-control control-maximize"></div>
      </div>
    </div>
    
    <div class="terminal-content">
      <div class="terminal-prompt">
        $ text_to_speech --start<span class="typing-cursor"></span>
      </div>

      <textarea class="hacker-textarea" id="textInput" placeholder="ENTER YOUR TEXT HERE..."></textarea>
      
      <button class="hacker-btn" onclick="convertTextToSpeech()">
        <i class="fas fa-volume-up"></i> CONVERT & PLAY
      </button>
      
      <div class="status-message" id="statusMessage"></div>
      
      <audio class="hacker-audio" id="audioPlayer" controls></audio>

      <div class="whatsapp-channel">
        <a href="https://whatsapp.com/channel/0029Vaxu3IeFy726dtMIEC1a" target="_blank">
          <i class="fab fa-whatsapp"></i> JOIN OUR WHATSAPP CHANNEL FOR MORE TOOLS
        </a>
      </div>

      <div class="footer">
        DEVELOPED BY <a href="https://msedits.pages.dev" target="_blank">MS EDITS</a>
      </div>
    </div>
  </div>

  <script>
    function convertTextToSpeech() {
      const text = document.getElementById('textInput').value.trim();
      const statusMessage = document.getElementById('statusMessage');
      
      if (!text) {
        statusMessage.textContent = "ERROR: PLEASE ENTER SOME TEXT.";
        statusMessage.style.color = '#ff6b6b';
        return;
      }

      statusMessage.textContent = "PROCESSING... PLEASE WAIT.";
      statusMessage.style.color = 'var(--hacker-green)';

      const apiUrl = `https://text-to-speech.manzoor76b.workers.dev/?text=${encodeURIComponent(text)}`;
      const audioPlayer = document.getElementById('audioPlayer');
      
      // Reset audio player
      audioPlayer.src = '';
      
      // Set new source and play
      audioPlayer.src = apiUrl;
      
      audioPlayer.onloadeddata = function() {
        statusMessage.textContent = "READY TO PLAY. CLICK PLAY BUTTON.";
        audioPlayer.play().catch(function(error) {
          statusMessage.textContent = "ERROR: AUTOPLAY BLOCKED. CLICK PLAY BUTTON MANUALLY.";
          console.log('Autoplay prevented:', error);
        });
      };
      
      audioPlayer.onerror = function() {
        statusMessage.textContent = "ERROR: FAILED TO LOAD AUDIO. PLEASE TRY AGAIN.";
        statusMessage.style.color = '#ff6b6b';
      };
      
      audioPlayer.onended = function() {
        statusMessage.textContent = "PLAYBACK COMPLETED.";
      };
    }

    // Add some terminal-like typing effect
    document.addEventListener('DOMContentLoaded', function() {
      const prompt = document.querySelector('.terminal-prompt');
      const text = prompt.textContent;
      prompt.textContent = '';
      
      let i = 0;
      function typeWriter() {
        if (i < text.length) {
          prompt.textContent += text.charAt(i);
          i++;
          setTimeout(typeWriter, 50);
        }
      }
      
      // Start typing effect after a short delay
      setTimeout(typeWriter, 500);
    });

    // Add Enter key support for conversion
    document.getElementById('textInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter' && e.ctrlKey) {
        convertTextToSpeech();
      }
    });
  </script>
</body>
</html>
