<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS EDITS IMAGE TO LINK TOOL</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --hacker-green: #00ff00;
            --hacker-dark: #0a0a0a;
            --hacker-darker: #050505;
            --hacker-gray: #1a1a1a;
            --hacker-light: #cccccc;
        }

        body {
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--hacker-darker);
            color: var(--hacker-light);
            overflow-x: hidden;
            position: relative;
            scroll-behavior: smooth;
        }

        /* Matrix Background */
        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(30, 30, 30, 0.8) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(20, 20, 20, 0.6) 0%, transparent 50%);
            z-index: -1;
        }

        .matrix-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 0, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: matrixMove 20s linear infinite;
        }

        @keyframes matrixMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(50px); }
        }

        /* Terminal Container */
        .terminal-container {
            background: linear-gradient(145deg, #1a1a1a, #222222);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 255, 0, 0.1);
            position: relative;
            width: 100%;
            max-width: 600px;
            margin: 20px;
        }

        .terminal-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent, rgba(0, 255, 0, 0.05), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }

        .terminal-container:hover::before {
            transform: translateX(100%);
        }

        /* Terminal Header */
        .terminal-header {
            background: rgba(10, 10, 10, 0.9);
            padding: 15px 20px;
            border-bottom: 1px solid rgba(0, 255, 0, 0.2);
            display: flex;
            align-items: center;
        }

        .terminal-title {
            color: var(--hacker-green);
            font-weight: bold;
            font-size: 1.2rem;
            margin: 0;
        }

        .terminal-controls {
            margin-left: auto;
            display: flex;
            gap: 10px;
        }

        .terminal-control {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .control-close { background: #ff5f57; }
        .control-minimize { background: #ffbd2e; }
        .control-maximize { background: #28ca42; }

        /* Terminal Content */
        .terminal-content {
            padding: 30px;
        }

        .terminal-prompt {
            color: var(--hacker-green);
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        /* Upload Area */
        .upload-area {
            border: 2px dashed rgba(0, 255, 0, 0.3);
            border-radius: 8px;
            padding: 30px 20px;
            margin-bottom: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            color: var(--hacker-light);
            font-weight: 600;
            background: rgba(20, 20, 20, 0.5);
        }

        .upload-area:hover {
            border-color: var(--hacker-green);
            color: var(--hacker-green);
            background: rgba(0, 255, 0, 0.05);
        }

        .upload-area i {
            font-size: 3em;
            color: var(--hacker-green);
        }

        input[type="file"] {
            display: none;
        }

        /* URL Output */
        #urlOutput {
            width: 100%;
            padding: 12px;
            margin-top: 25px;
            border: 1px solid rgba(0, 255, 0, 0.3);
            border-radius: 5px;
            font-size: 0.95em;
            background: rgba(20, 20, 20, 0.8);
            color: var(--hacker-light);
            cursor: text;
            text-align: center;
            font-family: 'Courier New', monospace;
        }

        #urlOutput:focus {
            outline: none;
            border-color: var(--hacker-green);
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .hacker-btn {
            background: linear-gradient(90deg, var(--hacker-green), #00cc00);
            color: #000;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            transition: all 0.3s ease;
            padding: 12px 25px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
        }

        .hacker-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 0, 0.4);
        }

        .hacker-btn:active {
            transform: translateY(0);
        }

        .hacker-btn-outline {
            background: transparent;
            color: var(--hacker-green);
            border: 1px solid var(--hacker-green);
            font-weight: bold;
            border-radius: 5px;
            transition: all 0.3s ease;
            padding: 12px 25px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
        }

        .hacker-btn-outline:hover {
            background: rgba(0, 255, 0, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 0, 0.2);
        }

        /* Loader */
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid var(--hacker-green);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: none;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Toast Notification */
        .toast {
            visibility: hidden;
            min-width: 250px;
            background-color: rgba(20, 20, 20, 0.9);
            color: var(--hacker-light);
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 999;
            left: 50%;
            transform: translateX(-50%);
            bottom: 30px;
            font-size: 1em;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(0, 255, 0, 0.3);
            opacity: 0;
            transition: opacity 0.3s, bottom 0.3s;
            font-family: 'Courier New', monospace;
        }

        .toast.show {
            visibility: visible;
            opacity: 1;
            bottom: 50px;
        }

        .toast.error {
            background-color: rgba(211, 47, 47, 0.9);
            border-color: rgba(255, 0, 0, 0.3);
        }

        .toast.success {
            background-color: rgba(56, 142, 60, 0.9);
            border-color: rgba(0, 255, 0, 0.3);
        }

        /* Footer */
        .footer {
            margin-top: 30px;
            font-size: 0.85em;
            color: #777;
            text-align: center;
        }

        .footer a {
            color: var(--hacker-green);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .footer a:hover {
            color: #00cc00;
            text-decoration: underline;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .terminal-container {
                margin: 15px;
            }
            
            .terminal-content {
                padding: 20px;
            }
            
            .upload-area {
                padding: 20px 15px;
            }
            
            .button-group {
                flex-direction: column;
                align-items: center;
            }
            
            .hacker-btn, .hacker-btn-outline {
                width: 100%;
                max-width: 250px;
            }
        }

        @media (max-width: 576px) {
            .terminal-container {
                margin: 10px;
            }
            
            .terminal-content {
                padding: 15px;
            }
            
            .terminal-title {
                font-size: 1rem;
            }
            
            .upload-area {
                padding: 15px 10px;
            }
            
            .upload-area i {
                font-size: 2.5em;
            }
        }

        /* Cursor Animation */
        .typing-cursor {
            display: inline-block;
            width: 10px;
            height: 1.2em;
            background-color: var(--hacker-green);
            margin-left: 5px;
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>

<script>
(function() {
  // --- Helpers ---
  const removeExisting = (id) => {
    const el = document.getElementById(id);
    if (el) el.remove();
  };

  const clamp = (value, min, max) => Math.max(min, Math.min(max, value));

  // --- Create small popup at mouse position (for right-click) ---
  function showPopupAt(x, y) {
    removeExisting('inspect-popup');

      boxShadow: '0 8px 30px rgba(0,0,0,0.8), 0 0 10px rgba(57,255,20,0.04) inset',
      zIndex: 2147483647,
      maxWidth: '320px',
      whiteSpace: 'pre-wrap'
    });

    // content
    popup.innerHTML = `
      <div style="font-weight:700; margin-bottom:6px;">⚠️ INSPECTION NOT ALLOWED</div>
      <div style="font-size:13px; line-height:1.4;">

        اگر آپ کو اس ٹول کا کوڈ چاہیے تو اس نمبر پر رابطہ کریں:
        03167364896
      </div>
      <div style="text-align:right; margin-top:8px;">
        <button id="inspect-popup-ok" style="
          font-family: Courier New, monospace;
          font-weight:700;
          background: linear-gradient(90deg, rgba(57,255,20,0.95), rgba(30,200,10,0.95));

      </div>

    document.body.appendChild(popup);

    // ensure popup fully visible in viewport (adjust if near edges)
    const rect = popup.getBoundingClientRect();
    const pad = 8;
    let left = rect.left;
    let top = rect.top;
    if (rect.right > window.innerWidth - pad) left = window.innerWidth - rect.width - pad;
    if (rect.left < pad) left = pad;
    if (rect.bottom > window.innerHeight - pad) top = window.innerHeight - rect.height - pad;
    if (rect.top < pad) top = pad;
    popup.style.left = left + 'px';
    popup.style.top = top + 'px';
    popup.style.transform = 'none';

    // close handlers
    document.getElementById('inspect-popup-ok').addEventListener('click', () => removeExisting('inspect-popup'));
    // close popup when clicking anywhere else
    setTimeout(() => {
      window.addEventListener('mousedown', onDocClick);
    }, 10);

    function onDocClick(ev) {
      if (!popup.contains(ev.target)) {
        removeExisting('inspect-popup');
        window.removeEventListener('mousedown', onDocClick);
      }
    }
  }

  // --- Create centered hacker modal for keyboard shortcuts ---
  function showCenteredModal() {
    if (document.getElementById('inspect-hacker-overlay')) return;

    // overlay
    const overlay = document.createElement('div');
    overlay.id = 'inspect-hacker-overlay';
    Object.assign(overlay.style, {
      position: 'fixed',
      inset: '0',
      background: 'rgba(0,0,0,0.98)',
      display: 'flex',
      alignItems: 'center',
      justifyContent: 'center',
      zIndex: 2147483647,
      fontFamily: "Courier New, monospace",
      color: '#39ff14',
      padding: '18px'
    });

    const box = document.createElement('div');
    box.id = 'inspect-hacker-modal';
    Object.assign(box.style, {
      width: '92%',

      background: 'rgba(0,0,0,0.95)',
      border: '1px solid rgba(57,255,20,0.12)',
      padding: '28px',

      boxShadow: '0 20px 60px rgba(0,0,0,0.9), 0 0 40px rgba(57,255,20,0.06) inset',

    });

    header.innerHTML = '⚠️  <span style="font-weight:700; letter-spacing:1px;">INSPECTION NOT ALLOWED</span>';

    Object.assign(terminal.style, {

      borderRadius: '6px',

      whiteSpace: 'pre-wrap'
    });

    terminal.innerText =

    const btn = document.createElement('button');
    btn.innerText = 'I UNDERSTAND';
    Object.assign(btn.style, {

      borderRadius: '6px',
      cursor: 'pointer',
      boxShadow: '0 6px 20px rgba(57,255,20,0.10), 0 0 18px rgba(57,255,20,0.06) inset'
    });
    btn.addEventListener('click', removeCenteredModal);

    box.appendChild(header);
    box.appendChild(terminal);
    box.appendChild(btn);
    overlay.appendChild(box);
    document.body.appendChild(overlay);

    // inject blinking keyframes if not present
    if (!document.getElementById('inspect-hacker-anim')) {
      const style = document.createElement('style');
      style.id = 'inspect-hacker-anim';
      style.innerHTML = '@keyframes blink { 50% { opacity: 0 } 100% { opacity: 1 } }';
      document.head.appendChild(style);
    }

    // prevent clicking background to close (owner can remove from console)
  }

  function removeCenteredModal() {
    removeExisting('inspect-hacker-overlay');
  }

  // --- Blocks: show popup only when user actually acts ---
  document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
    // show popup at click point (use clientX/Y)
    const x = clamp(e.clientX, 8, window.innerWidth - 8);
    const y = clamp(e.clientY, 8, window.innerHeight - 8);
    showPopupAt(x, y);
  }, {passive: false});

  document.addEventListener('keydown', function(e) {
    const key = e.key || String.fromCharCode(e.keyCode || 0);

    // F12
    if (key === 'F12' || e.keyCode === 123) {
      e.preventDefault();
      showCenteredModal();
      return;
    }

    // Ctrl+Shift+I or Ctrl+Shift+J
    if (e.ctrlKey && e.shiftKey && (key.toLowerCase() === 'i' || key.toLowerCase() === 'j')) {
      e.preventDefault();
      showCenteredModal();
      return;
    }

    // Ctrl+U (view-source)
    if (e.ctrlKey && key.toLowerCase() === 'u') {
      e.preventDefault();
      showCenteredModal();
      return;
    }

    // Ctrl+Shift+C (element picker)
    if (e.ctrlKey && e.shiftKey && key.toLowerCase() === 'c') {

<body>
    <div class="matrix-bg"></div>

    <div class="terminal-container">
        <div class="terminal-header">
            <h2 class="terminal-title">MS EDITS IMAGE TO LINK TOOL</h2>
            <div class="terminal-controls">
                <div class="terminal-control control-close"></div>
                <div class="terminal-control control-minimize"></div>
                <div class="terminal-control control-maximize"></div>
            </div>
        </div>
        
        <div class="terminal-content">
            <div class="terminal-prompt">
                $ image_to_link --start<span class="typing-cursor"></span>
            </div>

            <div class="upload-area" onclick="document.getElementById('imageUpload').click()">
                <i class="fas fa-cloud-upload-alt"></i>
                <span>CLICK OR DRAG TO UPLOAD IMAGE</span>
                <input type="file" id="imageUpload" accept="image/*">
            </div>

            <div class="loader" id="loader"></div>

            <input type="text" id="urlOutput" readonly placeholder="IMAGE LINK WILL APPEAR HERE...">

            <div class="button-group">
                <button class="hacker-btn" onclick="uploadAndGenerate()">
                    <i class="fas fa-link"></i> GENERATE LINK
                </button>
                <button class="hacker-btn-outline" onclick="copyLink()">
                    <i class="fas fa-copy"></i> COPY LINK
                </button>
            </div>

            <div class="footer">
                DEVELOPED BY <a href="https://msedits.pages.dev" target="_blank">MS EDITS</a>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        async function uploadImage(fileInput, urlInput) {
            const file = fileInput.files[0]; // Get the first selected file
            if (!file) {
                showToast('Please select an image first.', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('image', file);
            formData.append('key', '274910e7dcf1794b3cdcce6956bc00b3'); // Your provided API key

            try {
                document.getElementById('loader').style.display = 'block';
                const response = await fetch('https://api.imgbb.com/1/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                if (data.success) {
                    urlInput.value = data.data.url;
                    showToast('Image uploaded successfully! Link generated.', 'success');
                } else {
                    showToast('Image upload failed: ' + (data.error.message || 'Unknown error'), 'error');
                }
            } catch (error) {
                showToast('Error uploading image: ' + error.message, 'error');
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        function uploadAndGenerate() {
            const fileInput = document.getElementById('imageUpload');
            const urlInput = document.getElementById('urlOutput');
            uploadImage(fileInput, urlInput);
        }

        function copyLink() {
            const urlInput = document.getElementById('urlOutput');
            if (urlInput.value) {
                urlInput.select();
                urlInput.setSelectionRange(0, 99999); /* For mobile devices */

                // Try to use Clipboard API first
                navigator.clipboard.writeText(urlInput.value)
                    .then(() => {
                        showToast('Link copied to clipboard!', 'success');
                    })
                    .catch(() => {
                        // Fallback for older browsers or if Clipboard API is not available/permitted
                        document.execCommand('copy');
                        showToast('Link copied to clipboard! (Fallback)', 'success');
                    });
            } else {
                showToast('No link to copy yet. Please upload an image first.', 'error');
            }
        }

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show ' + type; // Add type class
            setTimeout(() => {
                toast.className = toast.className.replace('show', '');
            }, 3000); // Hide after 3 seconds
        }

        // Drag and drop functionality
        const uploadArea = document.querySelector('.upload-area');
        const fileInput = document.getElementById('imageUpload');

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = 'var(--hacker-green)';
            uploadArea.style.color = 'var(--hacker-green)';
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.borderColor = 'rgba(0, 255, 0, 0.3)';
            uploadArea.style.color = 'var(--hacker-light)';
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = 'rgba(0, 255, 0, 0.3)';
            uploadArea.style.color = 'var(--hacker-light)';
            fileInput.files = e.dataTransfer.files;
            uploadAndGenerate(); // Auto-upload on drop
        });

        // Add some terminal-like typing effect
        document.addEventListener('DOMContentLoaded', function() {
            const prompt = document.querySelector('.terminal-prompt');
            const text = prompt.textContent;
            prompt.textContent = '';
            
            let i = 0;
            function typeWriter() {
                if (i < text.length) {
                    prompt.textContent += text.charAt(i);
                    i++;
                    setTimeout(typeWriter, 50);
                }
            }
            
            // Start typing effect after a short delay
            setTimeout(typeWriter, 500);
        });
    </script>
</body>
