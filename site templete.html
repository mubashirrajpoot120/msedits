<html lang="en">
<head>

    <style>
        
        /* --- MASTER STYLESHEET --- */
        :root {
            --bg-color: #0d0d0d;
            --container-bg: rgba(20, 20, 20, 0.85); /* Slightly less transparent for readability */
            --accent-color: #ff0000;
            --text-color: #e0e0e0;
            --input-bg: #1a1a1a;
            --success-color: #00ff00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* --- FIX/IMPROVEMENT: Allow scrolling --- */
        /* Make html and body take full height to act as a proper base */
        html, body {
            height: 100%;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            /* --- FIX/IMPROVEMENT: REMOVED `overflow: hidden` --- */
            /* This was the main cause of the mobile issues. Removing it allows the page to scroll. */
        }

        /* --- SHARED BACKGROUND ELEMENTS --- */
        /* These are fixed, so they will stay in place during scroll, which is the desired effect */
        #background-skull { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100vw; height: 100vh; z-index: -2; opacity: 0.15; animation: pulse-bg 8s infinite ease-in-out; }
        #background-skull svg { width: 100%; height: 100%; object-fit: contain; }
        #matrix-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        @keyframes pulse-bg { 0% { opacity: 0.1; transform: translate(-50%, -50%) scale(1); } 50% { opacity: 0.2; transform: translate(-50%, -50%) scale(1.05); } 100% { opacity: 0.1; transform: translate(-50%, -50%) scale(1); } }

        /* --- ENTRY GATE (No changes needed, works well) --- */
        #entry-gate {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.8); z-index: 100;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
        }
        .start-button {
            padding: 20px 40px; border: 2px solid var(--accent-color); color: var(--accent-color);
            font-size: 2rem; font-weight: bold; text-transform: uppercase; letter-spacing: 0.2em;
            text-align: center; animation: pulse-button 2s infinite;
            background: transparent; /* Ensure no background color */
        }
        @keyframes pulse-button {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 0, 0, 0.5); }
            50% { transform: scale(1.05); box-shadow: 0 0 35px rgba(255, 0, 0, 0.8); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 0, 0, 0.5); }
        }
        
        /* --- MAIN CONTENT & NAVIGATION --- */
        /* --- FIX/IMPROVEMENT: Make main-content the scrollable container --- */
        #main-content {
            display: none; /* Hidden by default */
            height: 100%; /* Take full height of the viewport */
            overflow-y: auto; /* Allow ONLY vertical scrolling if content overflows */
            -webkit-overflow-scrolling: touch; /* Smooth scrolling on iOS */
        }
        .main-header {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: 20px 40px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(10, 10, 10, 0.5); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--accent-color); z-index: 50;
        }
        .brand { font-size: 1.5em; font-weight: bold; color: var(--text-color); text-shadow: 0 0 5px var(--accent-color); }
        .main-nav a { color: var(--text-color); text-decoration: none; margin-left: 30px; font-size: 1.1em; text-transform: uppercase; transition: all 0.3s ease; cursor: pointer; }
        .main-nav a:hover, .main-nav a.active { color: var(--accent-color); text-shadow: 0 0 10px var(--accent-color); }

        /* --- PAGE SECTIONS --- */
        .page-section {
            display: none;
            justify-content: center;
            align-items: center;
            min-height: 100%; /* Use 100% instead of 100vh to respect parent's height */
            padding: 120px 20px 40px 20px; /* Generous padding for content */
        }
        .page-section.active {
            display: flex;
            flex-direction: column; /* Ensure vertical alignment */
        }

        /* --- SHARED CONTAINER & GLITCH TITLE --- */
        .container {
            width: 100%;
            max-width: 550px;
            background-color: var(--container-bg);
            padding: 40px;
            border-radius: 8px;
            border: 1px solid var(--accent-color);
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.4);
            margin: auto; /* Ensures it stays centered within the flex container */

        .glitch-title { font-size: 3rem; font-weight: bold; text-transform: uppercase; letter-spacing: 0.1em; position: relative; text-shadow: 0 0 5px var(--accent-color), 0 0 10px var(--accent-color), 0 0 15px var(--accent-color); text-align: center; }
        .glitch-title::before, .glitch-title::after { content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); overflow: hidden; }
        .glitch-title::before { left: 2px; text-shadow: -1px 0 #00ff00; animation: glitch-anim-1 2s infinite linear alternate-reverse; }
        .glitch-title::after { left: -2px; text-shadow: -1px 0 #ffff00; animation: glitch-anim-2 2s infinite linear alternate-reverse; }
        @keyframes glitch-anim-1 { 0% { clip-path: inset(10% 0 80% 0); } 20% { clip-path: inset(50% 0 10% 0); } 40% { clip-path: inset(90% 0 5% 0); } 60% { clip-path: inset(25% 0 60% 0); } 80% { clip-path: inset(5% 0 75% 0); } 100% { clip-path: inset(70% 0 20% 0); } }
        @keyframes glitch-anim-2 { 0% { clip-path: inset(80% 0 15% 0); } 20% { clip-path: inset(20% 0 70% 0); } 40% { clip-path: inset(60% 0 5% 0); } 60% { clip-path: inset(10% 0 85% 0); } 80% { clip-path: inset(90% 0 5% 0); } 100% { clip-path: inset(40% 0 40% 0); } }

        /* --- MAILER & CONTACT STYLES --- */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px 15px; background-color: var(--input-bg); border: 1px solid #333; border-radius: 4px; color: var(--text-color); font-family: inherit; font-size: 1em; transition: all 0.3s ease; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--accent-color); box-shadow: 0 0 10px var(--accent-color); }
        .form-group textarea { resize: vertical; min-height: 120px; }
        .button-container { display: flex; align-items: center; gap: 15px; }
        button { flex-grow: 1; padding: 15px; background: var(--accent-color); border: none; border-radius: 4px; color: white; font-size: 1.1em; font-weight: bold; font-family: inherit; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: all 0.2s ease; }
        button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 0 20px var(--accent-color); }
        button:disabled { background: #555; cursor: not-allowed; opacity: 0.5; }
        .loader { width: 24px; height: 24px; border: 3px solid rgba(255, 0, 0, 0.3); border-top-color: var(--accent-color); border-radius: 50%; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #response { margin-top: 20px; padding: 15px; border-radius: 4px; font-weight: bold; text-align: center; display: none; }
        #response.success { background-color: var(--success-color); color: black; text-shadow: 0 0 5px #fff; }
        #response.error { background-color: var(--accent-color); color: white; text-shadow: 0 0 5px #000; }
        .contact-container { text-align: center; }
        .contact-container p { font-size: 1.2em; margin: 30px 0; line-height: 1.6; }
        .contact-button { display: inline-block; padding: 20px 40px; background: var(--accent-color); color: white; text-decoration: none; font-size: 1.5em; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; border-radius: 4px; transition: all 0.2s ease; }
        .contact-button:hover { transform: translateY(-3px); box-shadow: 0 0 25px var(--accent-color); }


        /* --- FIX/IMPROVEMENT: ENHANCED RESPONSIVE STYLES --- */
        @media (max-width: 768px) {
            .main-header {
                flex-direction: column; /* Stack brand and nav */
                padding: 15px;
                gap: 10px; /* Add space between brand and nav */

            .brand {
                margin-bottom: 0; /* Remove bottom margin as gap is used now */
            }
            .main-nav {
                display: flex;
                flex-wrap: wrap; /* Allow nav links to wrap onto new lines */
                justify-content: center; /* Center the links */
                width: 100%;
            }
            .main-nav a {
                margin: 5px 10px; /* Adjust margin for wrapped items */
            }

            /* Adjust page padding to account for the taller fixed header */
            .page-section {
                padding-top: 160px; /* Increased padding top */
                padding-left: 10px; /* Reduce side padding */
                padding-right: 10px;
            }

            /* Reduce container padding on small screens */
            .container {
                padding: 25px;
            }

            .glitch-title { font-size: 2.2rem; } /* Slightly larger title */
            .contact-container p { font-size: 1rem; } /* More readable paragraph text */
        }
    </style>

<script>
(function() {
  // --- Helpers ---
  const removeExisting = (id) => {
    const el = document.getElementById(id);
    if (el) el.remove();
  };

  const clamp = (value, min, max) => Math.max(min, Math.min(max, value));

  // --- Create small popup at mouse position (for right-click) ---
  function showPopupAt(x, y) {
    removeExisting('inspect-popup');

    const popup = document.createElement('div');
    popup.id = 'inspect-popup';
    Object.assign(popup.style, {
      position: 'fixed',
      left: x + 'px',
      top: y + 'px',
      transform: 'translate(-10px, -10px)',
      background: '#000',
      color: '#39ff14',
      fontFamily: "Courier New, monospace",
      padding: '12px 14px',
      borderRadius: '6px',
      border: '1px solid rgba(57,255,20,0.12)',
      boxShadow: '0 8px 30px rgba(0,0,0,0.8), 0 0 10px rgba(57,255,20,0.04) inset',
      zIndex: 2147483647,
      maxWidth: '320px',
      whiteSpace: 'pre-wrap'
    });

    // content
    popup.innerHTML = `
      <div style="font-weight:700; margin-bottom:6px;">⚠️ INSPECTION NOT ALLOWED</div>
      <div style="font-size:13px; line-height:1.4;">
        ms edits — my dear son:
        If you want this tool's source code, contact: 03167364896

        اگر آپ کو اس ٹول کا کوڈ چاہیے تو اس نمبر پر رابطہ کریں:
        03167364896
      </div>
      <div style="text-align:right; margin-top:8px;">
        <button id="inspect-popup-ok" style="
          font-family: Courier New, monospace;
          font-weight:700;
          background: linear-gradient(90deg, rgba(57,255,20,0.95), rgba(30,200,10,0.95));
          color: #001b00;
          border: 1px solid rgba(57,255,20,0.9);
          padding:6px 10px;
          border-radius:5px;
          cursor:pointer;
        ">I UNDERSTAND</button>
      </div>
    `;

    document.body.appendChild(popup);

    // ensure popup fully visible in viewport (adjust if near edges)
    const rect = popup.getBoundingClientRect();
    const pad = 8;
    let left = rect.left;
    let top = rect.top;
    if (rect.right > window.innerWidth - pad) left = window.innerWidth - rect.width - pad;
    if (rect.left < pad) left = pad;
    if (rect.bottom > window.innerHeight - pad) top = window.innerHeight - rect.height - pad;
    if (rect.top < pad) top = pad;
    popup.style.left = left + 'px';
    popup.style.top = top + 'px';
    popup.style.transform = 'none';

    // close handlers
    document.getElementById('inspect-popup-ok').addEventListener('click', () => removeExisting('inspect-popup'));
    // close popup when clicking anywhere else
    setTimeout(() => {
      window.addEventListener('mousedown', onDocClick);
    }, 10);

    function onDocClick(ev) {
      if (!popup.contains(ev.target)) {
        removeExisting('inspect-popup');
        window.removeEventListener('mousedown', onDocClick);
      }
    }
  }

  // --- Create centered hacker modal for keyboard shortcuts ---
  function showCenteredModal() {
    if (document.getElementById('inspect-hacker-overlay')) return;

    // overlay
    const overlay = document.createElement('div');
    overlay.id = 'inspect-hacker-overlay';
    Object.assign(overlay.style, {
      position: 'fixed',
      inset: '0',
      background: 'rgba(0,0,0,0.98)',
      display: 'flex',
      alignItems: 'center',
      justifyContent: 'center',
      zIndex: 2147483647,
      fontFamily: "Courier New, monospace",
      color: '#39ff14',
      padding: '18px'
    });

    const box = document.createElement('div');
    box.id = 'inspect-hacker-modal';
    Object.assign(box.style, {
      width: '92%',
      maxWidth: '760px',
      background: 'rgba(0,0,0,0.95)',
      border: '1px solid rgba(57,255,20,0.12)',
      padding: '28px',
      borderRadius: '8px',
      boxShadow: '0 20px 60px rgba(0,0,0,0.9), 0 0 40px rgba(57,255,20,0.06) inset',
      textAlign: 'left',
      lineHeight: '1.6'
    });

    const header = document.createElement('div');
    header.innerHTML = '⚠️  <span style="font-weight:700; letter-spacing:1px;">INSPECTION NOT ALLOWED</span>';
    Object.assign(header.style, {
      color: '#39ff14',
      fontSize: '20px',
      marginBottom: '12px'
    });

    const terminal = document.createElement('div');
    Object.assign(terminal.style, {
      background: 'transparent',
      padding: '14px',
      borderRadius: '6px',
      minHeight: '90px',
      color: '#39ff14',
      fontSize: '15px',
      whiteSpace: 'pre-wrap'
    });

    terminal.innerText =
`ms edits — my dear son:
If you want this tool's source code, contact: 03167364896

اگر آپ کو اس ٹول کا کوڈ چاہیے تو اس نمبر پر رابطہ کریں:
03167364896
`;

    const caret = document.createElement('span');
    caret.textContent = ' █';
    Object.assign(caret.style, {
      display: 'inline-block',
      marginLeft: '6px',
      animation: 'blink 1s steps(2, start) infinite'
    });
    terminal.appendChild(caret);

    const btn = document.createElement('button');
    btn.innerText = 'I UNDERSTAND';
    Object.assign(btn.style, {
      marginTop: '16px',
      padding: '10px 20px',
      fontSize: '14px',
      fontFamily: "Courier New, monospace",
      color: '#001b00',
      background: 'linear-gradient(90deg, rgba(57,255,20,0.95), rgba(30,200,10,0.95))',
      border: '1px solid rgba(57,255,20,0.9)',
      borderRadius: '6px',
      cursor: 'pointer',
      boxShadow: '0 6px 20px rgba(57,255,20,0.10), 0 0 18px rgba(57,255,20,0.06) inset'
    });
    btn.addEventListener('click', removeCenteredModal);

    box.appendChild(header);
    box.appendChild(terminal);
    box.appendChild(btn);
    overlay.appendChild(box);
    document.body.appendChild(overlay);

    // inject blinking keyframes if not present
    if (!document.getElementById('inspect-hacker-anim')) {
      const style = document.createElement('style');
      style.id = 'inspect-hacker-anim';
      style.innerHTML = '@keyframes blink { 50% { opacity: 0 } 100% { opacity: 1 } }';
      document.head.appendChild(style);
    }

    // prevent clicking background to close (owner can remove from console)
  }

  function removeCenteredModal() {
    removeExisting('inspect-hacker-overlay');
  }

  // --- Blocks: show popup only when user actually acts ---
  document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
    // show popup at click point (use clientX/Y)
    const x = clamp(e.clientX, 8, window.innerWidth - 8);
    const y = clamp(e.clientY, 8, window.innerHeight - 8);
    showPopupAt(x, y);
  }, {passive: false});

  document.addEventListener('keydown', function(e) {
    const key = e.key || String.fromCharCode(e.keyCode || 0);

    // F12
    if (key === 'F12' || e.keyCode === 123) {
      e.preventDefault();
      showCenteredModal();
      return;
    }

    // Ctrl+Shift+I or Ctrl+Shift+J
    if (e.ctrlKey && e.shiftKey && (key.toLowerCase() === 'i' || key.toLowerCase() === 'j')) {
      e.preventDefault();
      showCenteredModal();
      return;
    }

    // Ctrl+U (view-source)
    if (e.ctrlKey && key.toLowerCase() === 'u') {
      e.preventDefault();
      showCenteredModal();
      return;
    }

    // Ctrl+Shift+C (element picker)
    if (e.ctrlKey && e.shiftKey && key.toLowerCase() === 'c') {
      e.preventDefault();
      showCenteredModal();
      return;
    }
  }, {passive: false});

  // --- Optional: allow owner remove via console if needed ---
  // run: document.getElementById('inspect-popup')?.remove(); document.getElementById('inspect-hacker-overlay')?.remove();

})();
</script>

                const response = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if (!response.ok) throw new Error(`Server responded with status: ${response.status}`);
                const result = await response.json();
                if (!result.success) throw new Error(result.error || 'Unknown API error.');

                const message = result.batch_summary ? `Transmission complete. ${result.batch_summary.total_successful}/${result.batch_summary.total_requested} payloads delivered.` : 'Transmission successful!';
                showResponse(message, 'success');
                e.target.reset();
            } catch (error) { showResponse(`Transmission Failed: ${error.message}`, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = 'Transmit';
                loader.style.display = 'none';
            }
        });
        function showResponse(message, type) {
            const responseDiv = document.getElementById('response');
            responseDiv.textContent = message;
            responseDiv.className = type;
            responseDiv.style.display = 'block';
        }

        // --- MATRIX RAIN ANIMATION ---
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        let columns;
        let rainDrops;

        function setupMatrix() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            columns = Math.floor(canvas.width / fontSize);
            rainDrops = Array(columns).fill(1);
        }

        const alphabet = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン' + 'ABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890@#$%^&*()*&^%+-/~{[|`]}';
        const fontSize = 16;
        const colors = ['#ff0000', '#ffff00', '#00ff00'];
        
        const draw = () => {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = fontSize + 'px monospace';
            rainDrops.forEach((y, ind) => {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
                ctx.fillText(text, ind * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) {
                    rainDrops[ind] = 0;
                } else {
                    rainDrops[ind] = y + 1;
                }
            });
        };

        // --- FIX/IMPROVEMENT: Correctly handle window resize for the matrix ---
        window.addEventListener('resize', setupMatrix);
        
        // Initial setup and animation start
        setupMatrix();
        setInterval(draw, 33);
    
    </script>
    
</body>

</html>
