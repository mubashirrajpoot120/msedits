        * {

        body {
            font-family: 'Courier New', monospace;
            background-color: var(--hacker-darker);

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--hacker-light);
            position: relative;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Matrix Background */
        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(30, 30, 30, 0.8) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(20, 20, 20, 0.6) 0%, transparent 50%);
            z-index: -1;
        }

        .matrix-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 0, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: matrixMove 20s linear infinite;
        }

        @keyframes matrixMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(50px); }
        }

        /* Terminal Container */
        .terminal-container {
            background: linear-gradient(145deg, #1a1a1a, #222222);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 255, 0, 0.1);
            position: relative;
            width: 100%;
            max-width: 600px;
            margin: 20px;

        .terminal-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent, rgba(0, 255, 0, 0.05), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s;

        .terminal-container:hover::before {
            transform: translateX(100%);

                downloadVideo();
            }
        });

        // Pre-fill with example URL
        document.getElementById('tiktokUrl').value = "";

        async function downloadVideo() {
            const tiktokUrl = document.getElementById('tiktokUrl').value.trim();
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error');
            const successEl = document.getElementById('success');
            const resultsEl = document.getElementById('results');
            const downloadBtn = document.getElementById('downloadBtn');
            
            if (!tiktokUrl) {
                showError('PLEASE ENTER A TIKTOK URL');
                return;
            }
            
            // Validate TikTok URL format
            if (!isValidTikTokUrl(tiktokUrl)) {
                showError('PLEASE ENTER A VALID TIKTOK URL');
                return;
            }
            
            // Show loading state
            loadingEl.style.display = 'block';
            errorEl.style.display = 'none';
            successEl.style.display = 'none';
            resultsEl.innerHTML = '';
            downloadBtn.disabled = true;
            
            try {
                // Construct API URL
                const apiUrl = `https://old-studio-tiktok-down.oldhacker7866.workers.dev/?url=${encodeURIComponent(tiktokUrl)}`;
                
                console.log("FETCHING FROM:", apiUrl);
                
                // Fetch video data with timeout
                const fetchPromise = fetch(apiUrl);
                const timeoutPromise = new Promise((_, reject) => 
                    setTimeout(() => reject(new Error('REQUEST TIMEOUT')), 15000)
                );
                
                const response = await Promise.race([fetchPromise, timeoutPromise]);
                
                if (!response.ok) {
                    throw new Error(`HTTP ERROR! STATUS: ${response.status}`);
                }
                
                const data = await response.json();
                console.log("API RESPONSE:", data);
                
                // Try different possible response formats
                let videoUrl = null;
                
                // Format 1: Direct video URL in response
                if (typeof data === 'string' && data.startsWith('http')) {
                    videoUrl = data;
                }
                // Format 2: Object with videoUrl property
                else if (data && data.videoUrl) {
                    videoUrl = data.videoUrl;
                }
                // Format 3: Object with url property
                else if (data && data.url) {
                    videoUrl = data.url;
                }
                // Format 4: Object with download_url or similar
                else if (data && data.download_url) {
                    videoUrl = data.download_url;
                }
                // Format 5: Nested object structure
                else if (data && data.data && data.data.videoUrl) {
                    videoUrl = data.data.videoUrl;
                }
                // Format 6: Check for any property containing 'video' or 'url'
                else if (data) {
                    for (let key in data) {
                        if (typeof data[key] === 'string' && 
                            (data[key].includes('video') || data[key].includes('tiktok')) && 
                            data[key].startsWith('http')) {
                            videoUrl = data[key];
                            break;
                        }
                    }
                }
                
                if (!videoUrl) {
                    throw new Error('NO VIDEO URL FOUND IN RESPONSE');
                }
                
                // Ensure the URL is absolute
                if (!videoUrl.startsWith('http')) {
                    videoUrl = 'https:' + videoUrl;
                }
                
                console.log("FOUND VIDEO URL:", videoUrl);
                
                // Display video and download button
                displayVideo(videoUrl);
                
                loadingEl.style.display = 'none';
                downloadBtn.disabled = false;
                
            } catch (error) {
                console.error('ERROR:', error);
                loadingEl.style.display = 'none';
                downloadBtn.disabled = false;
                
                if (error.name === 'AbortError' || error.message === 'REQUEST TIMEOUT') {
                    showError('REQUEST TIMEOUT. PLEASE TRY AGAIN.');
                } else {
                    showError('FAILED TO DOWNLOAD VIDEO. PLEASE CHECK THE URL AND TRY AGAIN.');
                }
            }

            const resultsEl = document.getElementById('results');
            
            const videoContainer = document.createElement('div');

            videoContainer.innerHTML = `

                </video>
                <br>
                <button class="video-download-btn" onclick="forceDownload('${videoUrl}')">
                    📥 DOWNLOAD VIDEO
                </button>
            `;
            
            resultsEl.appendChild(videoContainer);
        }
        
        // Fixed download function - uses fetch and blob approach
        async function forceDownload(videoUrl) {
            const downloadBtn = document.querySelector('.video-download-btn');
            const originalText = downloadBtn.innerHTML;
            
            try {
                downloadBtn.innerHTML = '⏳ DOWNLOADING...';
                downloadBtn.disabled = true;
                
                // Fetch the video as blob
                const response = await fetch(videoUrl);
                const blob = await response.blob();
                
                // Create blob URL
                const blobUrl = window.URL.createObjectURL(blob);
                
                // Create download link
                const link = document.createElement('a');
                link.href = blobUrl;
                link.download = 'tiktok_video_' + Date.now() + '.mp4';
                
                // Trigger download
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                // Clean up
                window.URL.revokeObjectURL(blobUrl);
                
                downloadBtn.innerHTML = originalText;
                downloadBtn.disabled = false;
                
                showSuccess('✅ VIDEO DOWNLOADED SUCCESSFULLY!');
                
            } catch (error) {
                console.error('DOWNLOAD ERROR:', error);
                downloadBtn.innerHTML = originalText;
                downloadBtn.disabled = false;
                showError('❌ DOWNLOAD FAILED. PLEASE TRY AGAIN.');
            }
        }
        
        function isValidTikTokUrl(url) {
            const tiktokUrlPattern = /(https?:\/\/)?(www\.)?(vm\.|vt\.)?tiktok\.com\/(.*)/;
            return tiktokUrlPattern.test(url);
        }
        
        function showError(message) {
            const errorEl = document.getElementById('error');
            const successEl = document.getElementById('success');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
            successEl.style.display = 'none';
        }
        
        function showSuccess(message) {
            const errorEl = document.getElementById('error');
            const successEl = document.getElementById('success');
            successEl.textContent = message;
            successEl.style.display = 'block';
            errorEl.style.display = 'none';
            
            // Auto-hide success message after 3 seconds
            setTimeout(() => {
                successEl.style.display = 'none';
            }, 3000);
        }

        // Add typing effect
        document.addEventListener('DOMContentLoaded', function() {
            const prompt = document.querySelector('.terminal-prompt');
            const text = prompt.textContent;
            prompt.textContent = '';
            
            let i = 0;
            function typeWriter() {
                if (i < text.length) {
                    prompt.textContent += text.charAt(i);
                    i++;
                    setTimeout(typeWriter, 50);
                }
            }
            
            // Start typing effect after a short delay
            setTimeout(typeWriter, 500);
        });
    </script>
</body>
</html>
